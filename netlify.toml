# Netlify deploy config — static client + serverless function (shared statement store).
[build]
  command = "cd client && npm install && npm run build"
  publish = "client/dist"
  functions = "netlify/functions"

# SPA fallback so /boss (and any route) serves index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
